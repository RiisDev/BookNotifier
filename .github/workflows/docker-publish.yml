name: Publish Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      goodreads: ${{ steps.filter.outputs.goodreads }}
      scribblehub: ${{ steps.filter.outputs.scribblehub }}
      literotica: ${{ steps.filter.outputs.literotica }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            goodreads:
              - 'GoodReadsNotifier/**'
            scribblehub:
              - 'ScribbbleHubNotifier/**'
            literotica:
              - 'LiteroticaNotifier/**'

  build-and-push:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: goodreads-notifier
            context: ./GoodReadsNotifier
            changed: ${{ needs.changes.outputs.goodreads }}
          - name: scribblehub-notifier
            context: ./ScribbbleHubNotifier
            changed: ${{ needs.changes.outputs.scribblehub }}
          - name: literotica-notifier
            context: ./LiteroticaNotifier
            changed: ${{ needs.changes.outputs.literotica }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        if: ${{ matrix.changed == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}